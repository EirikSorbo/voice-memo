<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Voice Memo" />
  <title>Voice Memo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.1);
      --border-mid: rgba(0,0,0,0.18);
      --text: #1a1a1a;
      --muted: #888;
      --hint: #bbb;
      --green: #1D9E75;
      --red: #E24B4A;
      --red-bg: #FDF0F0;
      --red-border: rgba(226,75,74,0.3);
      --blue: #378ADD;
      --radius: 10px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --surface: #1c1c1a;
        --border: rgba(255,255,255,0.1);
        --border-mid: rgba(255,255,255,0.18);
        --text: #f0efe8;
        --muted: #888;
        --hint: #555;
        --red-bg: #2a1515;
        --red-border: rgba(226,75,74,0.25);
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem 1.5rem env(safe-area-inset-bottom, 1rem);
      gap: 0;
    }

    .title {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 24px;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle { display: none; }

    .record-ring {
      position: relative;
      width: 148px;
      height: 148px;
      margin-bottom: 28px;
      margin-top: 32px;
    }

    .pulse {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid var(--red);
      opacity: 0;
      transform: scale(1);
    }

    .pulse.active { animation: ripple 1.8s ease-out infinite; }
    .pulse:nth-child(2).active { animation-delay: 0.6s; }
    .pulse:nth-child(3).active { animation-delay: 1.2s; }

    @keyframes ripple {
      0%   { transform: scale(1);   opacity: 0.5; }
      100% { transform: scale(1.7); opacity: 0; }
    }

    .mic-btn {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      border: 1.5px solid var(--red-border);
      background: var(--red-bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
    }

    .mic-btn:active { transform: scale(0.95); }

    .mic-btn.recording {
      background: var(--red);
      border-color: var(--red);
    }

    .mic-icon {
      width: 34px;
      height: 34px;
      color: var(--red);
      transition: color 0.2s;
    }

    .mic-btn.recording .mic-icon { color: white; }

    .status {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--hint);
      margin-bottom: 8px;
      height: 16px;
      text-align: center;
      transition: color 0.3s;
    }

    .status.recording { color: var(--red); }

    .timer {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      height: 20px;
      margin-bottom: 40px;
      font-variant-numeric: tabular-nums;
    }

    .send-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: white;
      background: var(--blue);
      border: none;
      border-radius: var(--radius);
      padding: 14px 32px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .send-btn:active {
      transform: scale(0.97);
      opacity: 0.85;
    }

    .send-btn.sending {
      opacity: 0.5;
      pointer-events: none;
    }

    .feedback {
      margin-top: 20px;
      font-size: 11px;
      letter-spacing: 0.07em;
      color: var(--hint);
      text-align: center;
      height: 16px;
    }

    .feedback.success { color: var(--green); }
    .feedback.error   { color: var(--red); }

    .dots span { animation: blink 1.2s infinite; opacity: 0; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40%           { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <p class="title">Voice Memo</p>
    <p class="subtitle">speak · transcribe · send</p>

    <div class="record-ring">
      <div class="pulse" id="p1"></div>
      <div class="pulse" id="p2"></div>
      <div class="pulse" id="p3"></div>
      <button class="mic-btn" id="micBtn" onclick="toggleRecording()" aria-label="Record">
        <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
      </button>
    </div>

    <p class="status" id="status">&nbsp;</p>
    <p class="timer" id="timer">&nbsp;</p>

    <button class="send-btn" id="sendBtn" onclick="sendMemo()">Transcribe &amp; Email</button>
    <p class="feedback" id="feedback">&nbsp;</p>
  </div>

  <script>
    let isRecording = false;
    let mediaRecorder = null;
    let chunks = [];
    let timerInterval = null;
    let seconds = 0;
    let audioBlob = null;

    const micBtn   = document.getElementById('micBtn');
    const status   = document.getElementById('status');
    const timer    = document.getElementById('timer');
    const sendBtn  = document.getElementById('sendBtn');
    const feedback = document.getElementById('feedback');
    const pulses   = [document.getElementById('p1'), document.getElementById('p2'), document.getElementById('p3')];

    function pad(n) { return n < 10 ? '0' + n : String(n); }

    function setFeedback(msg, cls) {
      feedback.textContent = msg;
      feedback.className = 'feedback' + (cls ? ' ' + cls : '');
    }

    async function toggleRecording() {
      if (!isRecording) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          chunks = [];

          mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
          mediaRecorder.onstop = () => {
            audioBlob = new Blob(chunks, { type: 'audio/webm' });
            stream.getTracks().forEach(t => t.stop());
          };

          mediaRecorder.start(100);
          isRecording = true;
          seconds = 0;
          timerInterval = setInterval(() => {
            seconds++;
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            timer.textContent = pad(m) + ':' + pad(s);
          }, 1000);

          micBtn.classList.add('recording');
          pulses.forEach(p => p.classList.add('active'));
          status.textContent = 'recording';
          status.classList.add('recording');
          timer.textContent = '00:00';
          setFeedback('');
        } catch (e) {
          setFeedback('microphone access denied', 'error');
        }
      } else {
        mediaRecorder.stop();
        isRecording = false;
        clearInterval(timerInterval);
        micBtn.classList.remove('recording');
        pulses.forEach(p => p.classList.remove('active'));
        status.textContent = 'ready to send';
        status.classList.remove('recording');
      }
    }

    async function sendMemo() {
      if (!audioBlob) {
        setFeedback('record something first', 'error');
        return;
      }

      sendBtn.classList.add('sending');
      sendBtn.innerHTML = 'Sending<span class="dots"><span>.</span><span>.</span><span>.</span></span>';
      setFeedback('');

      try {
        const formData = new FormData();
        formData.append('audio', audioBlob, 'memo.webm');

        const res = await fetch('/transcribe-and-email', { method: 'POST', body: formData });

        if (res.ok) {
          setFeedback('report sent to your email ✓', 'success');
          audioBlob = null;
          sendBtn.classList.remove('sending');
          sendBtn.innerHTML = 'Transcribe &amp; Email';
          timer.innerHTML = '&nbsp;';
          
        } else {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'server error');
        }
      } catch (e) {
        setFeedback(e.message || 'something went wrong — try again', 'error');
        sendBtn.classList.remove('sending');
        sendBtn.innerHTML = 'Transcribe &amp; Email';
      }
    }
  </script>
</body>
</html>
