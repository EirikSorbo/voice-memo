<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Voice Memo" />
  <title>Voice Memo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.1);
      --border-mid: rgba(0,0,0,0.18);
      --text: #1a1a1a;
      --muted: #888;
      --hint: #bbb;
      --green: #1D9E75;
      --red: #E24B4A;
      --red-bg: #FDF0F0;
      --red-border: rgba(226,75,74,0.3);
      --blue: #378ADD;
      --radius: 10px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --surface: #1c1c1a;
        --border: rgba(255,255,255,0.1);
        --border-mid: rgba(255,255,255,0.18);
        --text: #f0efe8;
        --muted: #888;
        --hint: #555;
        --red-bg: #2a1515;
        --red-border: rgba(226,75,74,0.25);
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem 1.5rem env(safe-area-inset-bottom, 1rem);
      gap: 0;
    }

    .title {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 24px;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 32px;
      text-align: center;
    }

    .record-ring {
      position: relative;
      width: 148px;
      height: 148px;
      margin-bottom: 20px;
    }

    .pulse {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid var(--red);
      opacity: 0;
      transform: scale(1);
    }

    .pulse.active { animation: ripple 1.8s ease-out infinite; }
    .pulse:nth-child(2).active { animation-delay: 0.6s; }
    .pulse:nth-child(3).active { animation-delay: 1.2s; }

    @keyframes ripple {
      0%   { transform: scale(1);   opacity: 0.5; }
      100% { transform: scale(1.7); opacity: 0; }
    }

    .mic-btn {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      border: 1.5px solid var(--red-border);
      background: var(--red-bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
    }

    .mic-btn:active { transform: scale(0.95); }
    .mic-btn.recording { background: var(--red); border-color: var(--red); }
    .mic-btn.paused { background: var(--red-bg); border-color: var(--red-border); }

    .mic-icon {
      width: 34px;
      height: 34px;
      color: var(--red);
      transition: color 0.2s;
    }

    .mic-btn.recording .mic-icon { color: white; }
    .mic-btn.paused .mic-icon { color: var(--red); }

    .mini-controls {
      display: flex;
      gap: 20px;
      align-items: center;
      justify-content: center;
      height: 36px;
      margin-bottom: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .mini-controls.visible { opacity: 1; pointer-events: all; }

    .mini-btn {
      background: none;
      border: 0.5px solid var(--border-mid);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, transform 0.1s;
      color: var(--muted);
    }

    .mini-btn:active { transform: scale(0.93); background: var(--border); }
    .mini-btn svg { width: 16px; height: 16px; }

    .status {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--hint);
      margin-bottom: 8px;
      height: 16px;
      text-align: center;
      transition: color 0.3s;
    }

    .status.recording { color: var(--red); }
    .status.paused { color: var(--muted); }

    .timer {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      height: 20px;
      margin-bottom: 28px;
      font-variant-numeric: tabular-nums;
    }

    .transcript-box {
      display: none;
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 20px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 180px;
      overflow-y: auto;
    }

    .transcript-box.visible { display: block; }

    .btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 14px 32px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn.busy { opacity: 0.5; pointer-events: none; }
    .btn-blue { background: var(--blue); }


    .feedback {
      margin-top: 20px;
      font-size: 11px;
      letter-spacing: 0.07em;
      color: var(--hint);
      text-align: center;
      height: 16px;
    }

    .feedback.success {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 18px;
      letter-spacing: -0.01em;
      color: var(--text);
      height: auto;
    }

    .feedback.error { color: var(--red); }

    .dots span { animation: blink 1.2s infinite; opacity: 0; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40%           { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <p class="title">Voice Memo</p>

    <div class="record-ring">
      <div class="pulse" id="p1"></div>
      <div class="pulse" id="p2"></div>
      <div class="pulse" id="p3"></div>
      <button class="mic-btn" id="micBtn" aria-label="Record">
        <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
      </button>
    </div>

    <div class="mini-controls" id="miniControls">
      <button class="mini-btn" id="pauseBtn" aria-label="Pause">
        <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="4" height="16" rx="1"/>
          <rect x="14" y="4" width="4" height="16" rx="1"/>
        </svg>
        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
      </button>
      <button class="mini-btn" id="deleteBtn" aria-label="Delete" style="color: var(--red);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3,6 5,6 21,6"/>
          <path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/>
          <path d="M10,11v6M14,11v6"/>
          <path d="M9,6V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1V6"/>
        </svg>
      </button>
    </div>

    <p class="status" id="status">&nbsp;</p>
    <p class="timer" id="timer">&nbsp;</p>

    <div class="transcript-box" id="transcriptBox"></div>

    <button class="btn btn-blue" id="actionBtn">Transcribe</button>
    <p class="feedback" id="feedback">&nbsp;</p>
  </div>

  <script>
    let isRecording = false;
    let isPaused = false;
    let isBusy = false;
    let mediaRecorder = null;
    let chunks = [];
    let timerInterval = null;
    let seconds = 0;
    let audioBlob = null;
    let transcript = null;
    let language = null;
    let appState = 'idle'; // idle | recording | transcribing | ready | sending

    const micBtn        = document.getElementById('micBtn');
    const statusEl      = document.getElementById('status');
    const timerEl       = document.getElementById('timer');
    const actionBtn     = document.getElementById('actionBtn');
    const feedbackEl    = document.getElementById('feedback');
    const transcriptBox = document.getElementById('transcriptBox');
    const miniControls  = document.getElementById('miniControls');
    const pauseBtn      = document.getElementById('pauseBtn');
    const pauseIcon     = document.getElementById('pauseIcon');
    const playIcon      = document.getElementById('playIcon');
    const pulses        = ['p1','p2','p3'].map(id => document.getElementById(id));

    function pad(n) { return n < 10 ? '0' + n : String(n); }

    function setFeedback(msg, cls) {
      feedbackEl.textContent = msg || '\u00a0';
      feedbackEl.className = 'feedback' + (cls ? ' ' + cls : '');
    }

    function setPauseIcon(paused) {
      pauseIcon.style.display = paused ? 'none' : '';
      playIcon.style.display  = paused ? '' : 'none';
    }

    function setState(s) {
      appState = s;
      if (s === 'idle') {
        actionBtn.textContent = 'Transcribe';
        actionBtn.className = 'btn btn-blue';
        transcriptBox.classList.remove('visible');
        transcriptBox.textContent = '';
        miniControls.classList.remove('visible');
        timerEl.innerHTML = '&nbsp;';
        statusEl.innerHTML = '&nbsp;';
        statusEl.className = 'status';
      } else if (s === 'transcribing') {
        actionBtn.className = 'btn btn-blue busy';
        actionBtn.innerHTML = 'Transcribing<span class="dots"><span>.</span><span>.</span><span>.</span></span>';
        miniControls.classList.remove('visible');
      } else if (s === 'ready') {
        actionBtn.textContent = 'Send';
        actionBtn.className = "btn btn-blue";
        transcriptBox.classList.add('visible');
        miniControls.classList.remove('visible');
      } else if (s === 'sending') {
        actionBtn.className = 'btn btn-blue busy';
        actionBtn.innerHTML = 'Sending<span class="dots"><span>.</span><span>.</span><span>.</span></span>';
      }
    }

    function startTimer() {
      seconds = 0;
      timerEl.textContent = '00:00';
      timerInterval = setInterval(() => {
        seconds++;
        timerEl.textContent = pad(Math.floor(seconds / 60)) + ':' + pad(seconds % 60);
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    function stopRecording() {
      return new Promise(resolve => {
        if (!mediaRecorder) { resolve(); return; }
        mediaRecorder.onstop = () => {
          audioBlob = new Blob(chunks, { type: 'audio/webm' });
          try { mediaRecorder.stream.getTracks().forEach(t => t.stop()); } catch {}
          resolve();
        };
        // Resume first if paused, so .stop() fires correctly
        if (isPaused) { try { mediaRecorder.resume(); } catch {} }
        mediaRecorder.stop();
        isRecording = false;
        isPaused = false;
        stopTimer();
        micBtn.classList.remove('recording', 'paused');
        pulses.forEach(p => p.classList.remove('active'));
        statusEl.className = 'status';
        statusEl.innerHTML = '&nbsp;';
        setPauseIcon(false);
      });
    }

    function resetAll() {
      if (mediaRecorder && (isRecording || isPaused)) {
        mediaRecorder.onstop = () => {};
        try { if (isPaused) mediaRecorder.resume(); mediaRecorder.stop(); } catch {}
        try { mediaRecorder.stream.getTracks().forEach(t => t.stop()); } catch {}
      }
      isRecording = false;
      isPaused = false;
      isBusy = false;
      audioBlob = null;
      transcript = null;
      chunks = [];
      stopTimer();
      micBtn.classList.remove('recording', 'paused');
      pulses.forEach(p => p.classList.remove('active'));
      setPauseIcon(false);
      setFeedback('');
      setState('idle');
    }

    // Mic button — start/stop recording
    micBtn.addEventListener('click', async () => {
      if (isBusy) return;
      if (!isRecording && !isPaused) {
        // Start fresh recording
        resetAll();
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          chunks = [];
          mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
          mediaRecorder.start(100);
          isRecording = true;
          appState = 'idle';
          startTimer();
          micBtn.classList.add('recording');
          pulses.forEach(p => p.classList.add('active'));
          statusEl.textContent = 'recording';
          statusEl.className = 'status recording';
          miniControls.classList.add('visible');
          setFeedback('');
        } catch {
          setFeedback('microphone access denied', 'error');
        }
      } else {
        // Stop recording
        await stopRecording();
        miniControls.classList.add('visible');
      }
    });

    // Pause/resume button
    pauseBtn.addEventListener('click', () => {
      if (!mediaRecorder) return;
      if (!isPaused) {
        mediaRecorder.pause();
        isPaused = true;
        stopTimer();
        micBtn.classList.remove('recording');
        micBtn.classList.add('paused');
        pulses.forEach(p => p.classList.remove('active'));
        statusEl.textContent = 'paused';
        statusEl.className = 'status paused';
        setPauseIcon(true);
      } else {
        mediaRecorder.resume();
        isPaused = false;
        timerInterval = setInterval(() => {
          seconds++;
          timerEl.textContent = pad(Math.floor(seconds / 60)) + ':' + pad(seconds % 60);
        }, 1000);
        micBtn.classList.add('recording');
        micBtn.classList.remove('paused');
        pulses.forEach(p => p.classList.add('active'));
        statusEl.textContent = 'recording';
        statusEl.className = 'status recording';
        setPauseIcon(false);
      }
    });

    // Delete button
    document.getElementById('deleteBtn').addEventListener('click', resetAll);

    // Transcribe / Send button
    actionBtn.addEventListener('click', async () => {
      if (isBusy) return;

      if (appState === 'idle') {
        // Stop recording if still going
        if (isRecording || isPaused) await stopRecording();

        if (!audioBlob) {
          setFeedback('record something first', 'error');
          return;
        }

        isBusy = true;
        setState('transcribing');
        setFeedback('');

        try {
          const formData = new FormData();
          formData.append('audio', audioBlob, 'memo.webm');
          const res = await fetch('/transcribe', { method: 'POST', body: formData });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'transcription failed');
          transcript = data.transcript;
          language = data.language;
          transcriptBox.textContent = transcript;
          setState('ready');
        } catch (e) {
          setFeedback(e.message || 'something went wrong', 'error');
          setState('idle');
        } finally {
          isBusy = false;
        }

      } else if (appState === 'ready') {
        isBusy = true;
        setState('sending');
        setFeedback('');

        try {
          const res = await fetch('/send-report', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ transcript, language })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'server error');
          setFeedback('Sent', 'success');
          audioBlob = null;
          transcript = null;
          setState('idle');
        } catch (e) {
          setFeedback(e.message || 'something went wrong', 'error');
          setState('ready');
        } finally {
          isBusy = false;
        }
      }
    });
  </script>
</body>
</html>
